<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teste de Presença e Cadastro</title>
</head>
<body>

    <div style="background-color: #f0f0f0; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc;">
        <h3>Console de Retorno do Servidor:</h3>
        <p th:text="${mensagem}">Nenhuma ação executada ainda.</p>
    </div>

    <div style="border: 2px dashed #000; padding: 15px; margin-bottom: 30px;">
        <label for="eventoIdInput"><strong>Simulador de QR Code (ID do Evento):</strong></label>
        <input type="number" id="eventoIdInput" value="1" oninput="atualizarRotas()" style="width: 50px;">
        <p style="font-size: 12px; color: gray; margin: 5px 0 0 0;">
            * Mude o número acima para simular que o aluno está escaneando um evento diferente.
        </p>
    </div>

    <hr>

    <div style="margin-bottom: 40px;">
        <h2>Digite seu CPF se já cadastrou antes</h2>
        
        <form id="formPresenca" method="POST">
            <label for="cpfInput">CPF:</label>
            <input type="text" id="cpfInput" name="cpf" placeholder="Apenas números" required>
            
            <button type="submit">Se inscrever</button>
        </form>
    </div>

    <div style="margin-bottom: 20px;">
        <a href="#" onclick="alternarFormulario(); return false;">Clique aqui para cadastrar</a>
    </div>

    <hr>

    <div id="secaoCadastro" style="display: none; background-color: #fafafa; padding: 20px; border: 1px solid #ddd;">
        <h2>Se cadastre para entrar no evento</h2>
        
        <form id="formCadastro" method="POST">
            <p>
                <label style="display: inline-block; width: 80px;">Nome:</label>
                <input type="text" name="nome" required>
            </p>
            <p>
                <label style="display: inline-block; width: 80px;">CPF:</label>
                <input type="text" name="cpf" placeholder="Apenas números" required>
            </p>
            <p>
                <label style="display: inline-block; width: 80px;">Email:</label>
                <input type="email" name="email" required>
            </p>
            <p>
                <label style="display: inline-block; width: 80px;">LinkedIn:</label>
                <input type="text" name="linkedin" placeholder="Opcional">
            </p>
            
            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <script>
        function atualizarRotas() {
            // Pega o ID do evento digitado no simulador de QR Code
            var eventoId = document.getElementById("eventoIdInput").value;
            
            // Define os endpoints exatos do seu ParticipanteController
            document.getElementById("formPresenca").action = "/participantes/escanear/evento/" + eventoId;
            document.getElementById("formCadastro").action = "/participantes/cadastrar";
        }

        function alternarFormulario() {
            var secao = document.getElementById("secaoCadastro");
            if (secao.style.display === "none") {
                secao.style.display = "block";
            } else {
                secao.style.display = "none";
            }
        }

        // Executa uma vez ao carregar a página para definir as URLs iniciais com o ID '1'
        window.onload = atualizarRotas;
    </script>

</body>
</html>
